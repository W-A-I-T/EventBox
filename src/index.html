<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EventBox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      user-select: none;
    }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.75rem; color: #fff; margin-bottom: .25rem; }
    .header p { font-size: .8rem; color: #64748b; }

    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.running { background: #22c55e; box-shadow: 0 0 8px #22c55e80; }
    .status-dot.stopped { background: #ef4444; }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 440px;
      margin-bottom: 1rem;
    }

    .room-code {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: .4em;
      text-align: center;
      color: #f59e0b;
      padding: 1rem 0;
      cursor: pointer;
      transition: opacity .15s;
    }
    .room-code:hover { opacity: .8; }
    .room-code:active { opacity: .6; }

    .label { font-size: .75rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 0;
      border-bottom: 1px solid #334155;
      font-size: .85rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .key { color: #94a3b8; }
    .info-row .val { color: #38bdf8; font-family: monospace; }

    #qr-container {
      display: flex;
      justify-content: center;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      margin: 1rem 0;
    }

    .ip-list { list-style: none; padding: 0; }
    .ip-list li {
      font-family: monospace;
      font-size: .85rem;
      color: #38bdf8;
      padding: .25rem 0;
      cursor: pointer;
    }
    .ip-list li:hover { color: #7dd3fc; }

    .event-input-wrap {
      display: flex;
      gap: .5rem;
      margin-top: .75rem;
    }
    .event-input-wrap input {
      flex: 1;
      padding: .65rem .75rem;
      border-radius: 8px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: .85rem;
      outline: none;
    }
    .event-input-wrap input:focus { border-color: #6366f1; }

    .btn {
      padding: .65rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline { background: transparent; border: 2px solid #334155; color: #e2e8f0; }
    .btn-outline:hover { background: #1e293b; }

    .controls { display: flex; gap: .5rem; justify-content: center; margin-top: .5rem; }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #334155;
      color: #e2e8f0;
      padding: .5rem 1.25rem;
      border-radius: 8px;
      font-size: .8rem;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .error-msg {
      background: #7f1d1d;
      color: #fca5a5;
      padding: .75rem;
      border-radius: 8px;
      font-size: .8rem;
      margin-top: .75rem;
      display: flex;
      align-items: flex-start;
      gap: .5rem;
    }
    .error-text {
      flex: 1;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .error-dismiss {
      background: none;
      border: none;
      color: #fca5a5;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 .25rem;
      line-height: 1;
      opacity: .7;
      flex-shrink: 0;
    }
    .error-dismiss:hover { opacity: 1; }

    /* Deno status banner */
    .deno-status {
      width: 100%;
      max-width: 440px;
      margin-bottom: 1rem;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .8rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .deno-status.ok {
      background: #14532d;
      color: #86efac;
    }
    .deno-status.missing {
      background: #7f1d1d;
      color: #fca5a5;
    }
    .deno-status .deno-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }
    .deno-status .deno-info {
      flex: 1;
    }
    .deno-status .deno-info a {
      color: #93c5fd;
      text-decoration: underline;
    }
    .deno-status .deno-info a:hover {
      color: #bfdbfe;
    }
    .deno-status .deno-source {
      font-size: .7rem;
      opacity: .7;
      margin-left: .25rem;
    }

    /* Update banner */
    .update-banner {
      width: 100%;
      max-width: 440px;
      margin-bottom: 1rem;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .8rem;
      background: #1e3a5f;
      color: #93c5fd;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .update-banner .update-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }
    .update-banner .update-info {
      flex: 1;
    }
    .update-banner a {
      color: #60a5fa;
      text-decoration: underline;
      font-weight: 600;
    }
    .update-banner a:hover {
      color: #93c5fd;
    }
    .update-banner .update-dismiss {
      background: none;
      border: none;
      color: #93c5fd;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 .25rem;
      line-height: 1;
      opacity: .7;
      flex-shrink: 0;
    }
    .update-banner .update-dismiss:hover { opacity: 1; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>EventBox</h1>
    <p>LAN Authority Server</p>
  </div>

  <!-- Update available banner -->
  <div id="update-banner" class="update-banner hidden">
    <span class="update-icon">&#x2B06;</span>
    <span class="update-info" id="update-info"></span>
    <button class="update-dismiss" onclick="dismissUpdate()" title="Dismiss">&times;</button>
  </div>

  <!-- Deno status banner -->
  <div id="deno-banner" class="deno-status hidden">
    <span class="deno-icon" id="deno-icon"></span>
    <span class="deno-info" id="deno-info"></span>
  </div>

  <!-- Setup card (when no event ID) -->
  <div class="card" id="setup-card">
    <p class="label">Event Configuration</p>
    <p style="font-size:.85rem;color:#94a3b8;margin:.75rem 0">Enter the Event ID to start the server.</p>
    <div class="event-input-wrap">
      <input type="text" id="event-id-input" placeholder="Paste event ID…">
      <button class="btn btn-primary" id="start-btn" onclick="handleStart()">Start</button>
    </div>
    <div id="setup-error" class="error-msg hidden">
      <span class="error-text"></span>
      <button class="error-dismiss" onclick="dismissError()" title="Dismiss">&times;</button>
    </div>
  </div>

  <!-- Running card -->
  <div class="card hidden" id="running-card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <span class="status-dot running" id="status-dot"></span>
        <span style="font-weight:600;font-size:.9rem" id="status-text">Running</span>
      </div>
      <button class="btn btn-danger" style="font-size:.75rem;padding:.4rem .75rem" onclick="handleStop()">Stop</button>
    </div>

    <p class="label" style="margin-top:1.25rem">Room Code</p>
    <div class="room-code" id="room-code" onclick="copyCode()" title="Click to copy">------</div>

    <div id="qr-container">
      <canvas id="qr-canvas" width="180" height="180"></canvas>
    </div>

    <p class="label">Network</p>
    <ul class="ip-list" id="ip-list"></ul>

    <p class="label" style="margin-top:1rem">Details</p>
    <div class="info-row"><span class="key">Port</span><span class="val" id="detail-port">8787</span></div>
    <div class="info-row"><span class="key">Event ID</span><span class="val" id="detail-event" style="font-size:.7rem;word-break:break-all"></span></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ---- State ----
    let serverRunning = false;
    let starting = false;
    let startTimeout = null;
    let roomCode = '';
    let port = 8787;
    let localIps = [];
    let eventId = '';
    let denoAvailable = null; // null = unknown, true/false after check

    // ---- Tauri event listeners ----
    const isTauri = window.__TAURI__ !== undefined;

    if (isTauri) {
      const { listen } = window.__TAURI__.event;
      const { invoke } = window.__TAURI__.core;

      listen('server-status', (e) => {
        const d = e.payload;
        // Only consider startup complete when we have a room_code (success)
        // or the server has definitively stopped in a meaningful way.
        // During a start sequence, stop_server() fires a bare { running: false }
        // before the new server launches — ignore that transient event.
        // Only clear the timeout when:
        //  - we got a room_code (success), OR
        //  - running === false AND (there's an error OR we weren't starting)
        if (d.room_code || (d.running === false && (d.error || !starting))) {
          starting = false;
          if (startTimeout) { clearTimeout(startTimeout); startTimeout = null; }
        }
        if (d.running !== undefined) serverRunning = !!d.running;
        if (d.room_code) roomCode = d.room_code;
        if (d.port) port = d.port;
        if (d.event_id) eventId = d.event_id;
        if (d.error) showError(d.error);
        updateUI();
      });

      listen('local-ips', (e) => {
        localIps = e.payload.ips || [];
        updateUI();
      });

      // Check Deno availability on load
      invoke('check_deno').then((status) => {
        denoAvailable = status.available;
        updateDenoBanner(status);
      }).catch(() => {
        // Command not available (old binary) — hide banner
      });
    } else {
      document.getElementById('setup-card').querySelector('p').textContent =
        'Development mode — this UI is designed to run inside the EventBox desktop app.';
    }

    // ---- Deno banner ----
    function updateDenoBanner(status) {
      const banner = document.getElementById('deno-banner');
      const icon = document.getElementById('deno-icon');
      const info = document.getElementById('deno-info');

      banner.classList.remove('hidden', 'ok', 'missing');

      if (status.available) {
        banner.classList.add('ok');
        icon.textContent = '✓';
        const sourceLabel = status.source === 'sidecar' ? 'bundled' : 'system';
        info.innerHTML = `${status.version} <span class="deno-source">(${sourceLabel})</span>`;
      } else {
        banner.classList.add('missing');
        icon.textContent = '⚠';
        info.innerHTML =
          'Deno runtime not found. The server cannot start without it.<br>' +
          '<a href="' + status.install_url + '" target="_blank">Install Deno →</a> ' +
          'or reinstall EventBox to get the bundled version.';
      }
    }

    // ---- Actions ----
    function handleStart() {
      const input = document.getElementById('event-id-input');
      const id = input.value.trim();
      if (!id) {
        showError('Please enter an Event ID');
        return;
      }
      dismissError();
      roomCode = '';
      eventId = id;
      if (isTauri) {
        const { invoke } = window.__TAURI__.core;
        starting = true;
        updateUI();
        // Set the safety-net timeout BEFORE invoking so it cannot be
        // bypassed by a fast server-status event that arrives before
        // the .then() callback runs.
        if (startTimeout) clearTimeout(startTimeout);
        startTimeout = setTimeout(() => {
          if (starting && !roomCode) {
            starting = false;
            serverRunning = false;
            showError('Server did not respond in time. The bundled server binary may be missing or crashed.\nCheck the app logs for details.');
            updateUI();
          }
        }, 15000);
        invoke('set_event_id_and_start', { eventId: id })
          .catch((err) => {
            starting = false;
            if (startTimeout) { clearTimeout(startTimeout); startTimeout = null; }
            showError(String(err));
            updateUI();
          });
      } else {
        showError('This UI requires the EventBox desktop app.');
      }
    }

    function handleStop() {
      if (isTauri) {
        const { invoke } = window.__TAURI__.core;
        invoke('stop_server_cmd').catch(() => {});
      }
      serverRunning = false;
      updateUI();
    }

    function copyCode() {
      if (!roomCode) return;
      navigator.clipboard.writeText(roomCode).then(() => showToast('Room code copied!'));
    }

    // ---- UI ----
    function updateUI() {
      const setupCard = document.getElementById('setup-card');
      const runningCard = document.getElementById('running-card');
      const startBtn = document.getElementById('start-btn');
      if (startBtn) {
        startBtn.disabled = starting;
        startBtn.textContent = starting ? 'Starting…' : 'Start';
      }

      if (serverRunning && roomCode) {
        setupCard.classList.add('hidden');
        runningCard.classList.remove('hidden');

        document.getElementById('room-code').textContent = roomCode;
        document.getElementById('status-text').textContent = 'Running';
        document.getElementById('detail-port').textContent = port;
        document.getElementById('detail-event').textContent = eventId;

        // IPs
        const ipList = document.getElementById('ip-list');
        ipList.innerHTML = '';
        const staffUrl = (ip) => `http://${ip}:${port}/staff`;
        localIps.forEach(ip => {
          const li = document.createElement('li');
          li.textContent = staffUrl(ip);
          li.onclick = () => {
            navigator.clipboard.writeText(staffUrl(ip)).then(() => showToast('URL copied!'));
          };
          ipList.appendChild(li);
        });
        if (localIps.length === 0) {
          const li = document.createElement('li');
          li.textContent = `http://localhost:${port}/staff`;
          li.style.color = '#94a3b8';
          ipList.appendChild(li);
        }

        generateQR();
      } else if (serverRunning && !roomCode) {
        setupCard.classList.add('hidden');
        runningCard.classList.remove('hidden');
        document.getElementById('room-code').textContent = '......';
        document.getElementById('status-text').textContent = 'Starting…';
        document.getElementById('detail-port').textContent = port;
        document.getElementById('detail-event').textContent = eventId;
      } else {
        setupCard.classList.remove('hidden');
        runningCard.classList.add('hidden');
      }
    }

    function showError(msg) {
      dismissError();
      const el = document.getElementById('setup-error');
      el.querySelector('.error-text').textContent = msg;
      el.classList.remove('hidden');
    }

    function dismissError() {
      const el = document.getElementById('setup-error');
      el.classList.add('hidden');
      el.querySelector('.error-text').textContent = '';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function generateQR() {
      const canvas = document.getElementById('qr-canvas');
      const url = localIps.length > 0
        ? `http://${localIps[0]}:${port}/staff?join=${roomCode}`
        : `http://localhost:${port}/staff?join=${roomCode}`;

      if (window.qrcode) {
        drawRealQR(url);
        return;
      }
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
      s.onload = function() { drawRealQR(url); };
      s.onerror = function() { drawFallbackQR(canvas, url); };
      document.head.appendChild(s);
    }

    function drawRealQR(url) {
      const container = document.getElementById('qr-container');
      const qr = qrcode(0, 'L');
      qr.addData(url);
      qr.make();
      container.innerHTML = qr.createImgTag(5, 8);
    }

    function drawFallbackQR(canvas, url) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, 180, 180);
      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 14px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Room Code:', 90, 70);
      ctx.font = 'bold 28px monospace';
      ctx.fillText(roomCode, 90, 105);
      ctx.font = '9px system-ui';
      ctx.fillStyle = '#64748b';
      ctx.fillText(url, 90, 130);
      ctx.fillText('(QR unavailable offline)', 90, 150);
    }

    // ---- Manual update check ----
    // The built-in Tauri updater only works for AppImage on Linux.
    // This manual check works for all installation types (.deb, .msi, .dmg, AppImage).
    const UPDATE_JSON_URL = 'https://github.com/W-A-I-T/EventBox/releases/latest/download/latest.json';
    const RELEASES_URL = 'https://github.com/W-A-I-T/EventBox/releases/latest';
    // Embedded at build time from tauri.conf.json
    const CURRENT_VERSION = '0.3.14';

    function compareVersions(a, b) {
      const pa = a.split('.').map(Number);
      const pb = b.split('.').map(Number);
      for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
        const na = pa[i] || 0;
        const nb = pb[i] || 0;
        if (na > nb) return 1;
        if (na < nb) return -1;
      }
      return 0;
    }

    function checkForUpdates() {
      fetch(UPDATE_JSON_URL, { cache: 'no-store' })
        .then(r => r.ok ? r.json() : Promise.reject('fetch failed'))
        .then(data => {
          if (data.version && compareVersions(data.version, CURRENT_VERSION) > 0) {
            showUpdateBanner(data.version);
          }
        })
        .catch(() => {
          // Offline or fetch failed — silently ignore
        });
    }

    function showUpdateBanner(newVersion) {
      const banner = document.getElementById('update-banner');
      const info = document.getElementById('update-info');
      const versionText = 'Version ' + newVersion + ' is available! ';
      info.textContent = '';
      info.appendChild(document.createTextNode(versionText));
      const link = document.createElement('a');
      link.href = RELEASES_URL;
      link.target = '_blank';
      link.textContent = 'Download update';
      info.appendChild(link);
      banner.classList.remove('hidden');
    }

    function dismissUpdate() {
      document.getElementById('update-banner').classList.add('hidden');
    }

    // Run update check after a short delay (non-blocking, works offline)
    setTimeout(checkForUpdates, 3000);

    // Initial render
    updateUI();
  </script>
</body>
</html>
