name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            server-output: src-tauri/resources/eventbox-server
            tauri-rustup: stable
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            server-output: src-tauri/resources/eventbox-server.exe
            tauri-rustup: stable
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            server-output: src-tauri/resources/eventbox-server
            tauri-rustup: stable

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # NOTE: The Rust 1.85 pin was needed for Tauri v1 (wry 0.24 trait
      # collision).  Tauri v2 uses wry 0.45+ which does not have this issue,
      # so the stable toolchain is used for all platforms.

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          # Pin to a specific version to prevent CI from silently picking up
          # a broken release (e.g. Deno 2.6.0 shipped corrupt cross-compile
          # denort binaries — denoland/deno#31556).  Bump deliberately after
          # verifying `deno compile` still produces valid standalone binaries.
          deno-version: "2.1.9"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Compile EventBox server
        shell: bash
        run: |
          # Do NOT use --target here.  Every CI runner already matches its
          # build target (ubuntu=x86_64-linux, windows=x86_64-msvc,
          # macos=aarch64-darwin).  Omitting --target makes Deno embed its
          # OWN runtime instead of downloading a separate denort binary from
          # GitHub Releases.  The download path was the root cause of
          # "Could not find standalone binary section" — it introduced
          # network failures, version-mismatch risks, and exposure to Deno
          # release regressions (e.g. 2.6.0 shipped broken denort zips).
          deno compile --no-check \
            --allow-net --allow-read --allow-write --allow-env --allow-ffi \
            --unstable-ffi \
            --output ${{ matrix.server-output }} \
            src-tauri/resources/server.ts

      - name: Verify compiled server binary (pre-bundle)
        shell: bash
        run: |
          # Validate the Deno standalone binary BEFORE Tauri bundles it.
          # Uses Python for cross-platform consistency (available on all
          # GitHub Actions runners: Linux, macOS, Windows).
          python3 -c "
          import os, sys, hashlib
          path = sys.argv[1]
          if not os.path.isfile(path):
              print(f'ERROR: Server binary not found at {path}')
              sys.exit(1)
          size = os.path.getsize(path)
          print(f'Binary size: {size} bytes')
          if size < 1000:
              print(f'ERROR: Server binary is suspiciously small ({size} bytes)')
              sys.exit(1)
          with open(path, 'rb') as f:
              data = f.read()
          # Deno standalone binaries contain the magic string 'd3n0l4nd'.
          # In Deno 1.x it appeared at the last 8 bytes; in Deno 2.x on
          # Linux/macOS the binary uses ELF/Mach-O sections so the ELF
          # section header table occupies the end of file — the magic is
          # still present but at a variable offset inside the file.
          # On Windows (PE format) it still appears at the last 8 bytes.
          # Scan anywhere in the file to handle all platforms/versions.
          if b'd3n0l4nd' not in data:
              print(f'ERROR: Binary missing Deno standalone magic (d3n0l4nd)')
              print(f'  Last 8 bytes: {data[-8:]!r}')
              sys.exit(1)
          digest = hashlib.sha256(data).hexdigest()
          print(f'Binary validation passed (size={size}, sha256={digest}, magic OK)')
          " "${{ matrix.server-output }}"
          # Save a checksum so the post-bundle step can detect if the
          # bundler (AppImage linuxdeploy, etc.) silently corrupted the file.
          python3 -c "
          import hashlib, sys
          with open(sys.argv[1], 'rb') as f:
              print(hashlib.sha256(f.read()).hexdigest())
          " "${{ matrix.server-output }}" > /tmp/server-binary-sha256.txt

      - name: Build Tauri app
        run: cd src-tauri && cargo tauri build
        env:
          RUSTUP_TOOLCHAIN: ${{ matrix.tauri-rustup }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Prevent the AppImage linuxdeploy tool from stripping bundled
          # binaries.  `strip` removes data appended after the ELF proper,
          # which destroys the Deno standalone trailer.  This only affects
          # the Linux AppImage build; .deb, .msi, and .dmg are unaffected.
          NO_STRIP: "true"

      # After Tauri bundles the app, verify that the server binary inside
      # the final artifacts was not silently corrupted by the bundler
      # (e.g. linuxdeploy strip/patchelf on Linux AppImage).
      - name: Verify server binary inside bundle (post-bundle)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          EXPECTED_SHA=$(cat /tmp/server-binary-sha256.txt)
          echo "Expected SHA-256: $EXPECTED_SHA"

          # --- Check .deb ---
          DEB_FILE=$(ls src-tauri/target/release/bundle/deb/*.deb 2>/dev/null | head -1)
          if [ -n "$DEB_FILE" ]; then
            TMPDIR=$(mktemp -d)
            dpkg-deb -x "$DEB_FILE" "$TMPDIR"
            BUNDLED=$(find "$TMPDIR" -name 'eventbox-server' -not -name '*.ts' | head -1)
            if [ -n "$BUNDLED" ]; then
              ACTUAL_SHA=$(python3 -c "import hashlib,sys; print(hashlib.sha256(open(sys.argv[1],'rb').read()).hexdigest())" "$BUNDLED")
              echo ".deb server binary SHA-256: $ACTUAL_SHA"
              if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
                echo "ERROR: .deb bundler corrupted eventbox-server (SHA mismatch)"
                python3 -c "
          import sys
          data = open(sys.argv[1],'rb').read()
          present = b'd3n0l4nd' in data
          print(f'  Last 8 bytes: {data[-8:]!r}')
          print('  Deno magic present' if present else '  Deno magic MISSING')
          " "$BUNDLED"
                exit 1
              fi
              echo ".deb binary integrity OK"
            else
              echo "WARNING: eventbox-server not found inside .deb"
            fi
            rm -rf "$TMPDIR"
          fi

          # --- Check AppImage ---
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            TMPDIR=$(mktemp -d)
            APPIMAGE=$(realpath "$APPIMAGE")
            cd "$TMPDIR"
            "$APPIMAGE" --appimage-extract > /dev/null 2>&1
            BUNDLED=$(find squashfs-root -name 'eventbox-server' -not -name '*.ts' | head -1)
            if [ -n "$BUNDLED" ]; then
              ACTUAL_SHA=$(python3 -c "import hashlib,sys; print(hashlib.sha256(open(sys.argv[1],'rb').read()).hexdigest())" "$BUNDLED")
              echo "AppImage server binary SHA-256: $ACTUAL_SHA"
              if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
                echo "ERROR: AppImage bundler corrupted eventbox-server (SHA mismatch)"
                python3 -c "
          import sys
          data = open(sys.argv[1],'rb').read()
          present = b'd3n0l4nd' in data
          print(f'  Last 8 bytes: {data[-8:]!r}')
          print('  Deno magic present' if present else '  Deno magic MISSING')
          " "$BUNDLED"
                exit 1
              fi
              echo "AppImage binary integrity OK"
            else
              echo "WARNING: eventbox-server not found inside AppImage"
            fi
            rm -rf "$TMPDIR"
          fi

      - name: Rename artifacts to friendly names
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            cp src-tauri/target/release/bundle/deb/*.deb dist/EventBox-Linux.deb
            cp src-tauri/target/release/bundle/appimage/*.AppImage dist/EventBox-Linux.AppImage
            # Copy .sig files for updater
            cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz dist/EventBox-Linux.AppImage.tar.gz 2>/dev/null || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig dist/EventBox-Linux.AppImage.tar.gz.sig 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi dist/EventBox-Windows.msi
            cp src-tauri/target/release/bundle/msi/*.msi.zip dist/EventBox-Windows.msi.zip 2>/dev/null || true
            cp src-tauri/target/release/bundle/msi/*.msi.zip.sig dist/EventBox-Windows.msi.zip.sig 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg dist/EventBox-Mac.dmg
            cp src-tauri/target/release/bundle/macos/*.app.tar.gz dist/EventBox-Mac.app.tar.gz 2>/dev/null || true
            cp src-tauri/target/release/bundle/macos/*.app.tar.gz.sig dist/EventBox-Mac.app.tar.gz.sig 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EventBox-${{ matrix.platform }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json for updater
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="W-A-I-T/EventBox"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          # Read signatures (empty string if file missing — updater skips that platform)
          WIN_SIG=$(cat artifacts/EventBox-windows-latest/EventBox-Windows.msi.zip.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat artifacts/EventBox-macos-latest/EventBox-Mac.app.tar.gz.sig 2>/dev/null || echo "")
          LIN_SIG=$(cat artifacts/EventBox-ubuntu-22.04/EventBox-Linux.AppImage.tar.gz.sig 2>/dev/null || echo "")

          # Use jq to generate valid JSON (handles newlines/special chars in signatures)
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See release notes at $RELEASE_URL" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$WIN_SIG" \
            --arg base "$BASE" \
            --arg mac_sig "$MAC_SIG" \
            --arg lin_sig "$LIN_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $win_sig,
                  url: ($base + "/EventBox-Windows.msi.zip")
                },
                "darwin-aarch64": {
                  signature: $mac_sig,
                  url: ($base + "/EventBox-Mac.app.tar.gz")
                },
                "linux-x86_64": {
                  signature: $lin_sig,
                  url: ($base + "/EventBox-Linux.AppImage.tar.gz")
                }
              }
            }' > artifacts/latest.json

      - name: Build release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Collect commit messages since previous tag (skip chore: commits)
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" | grep -v "^- chore:" || true)
          else
            CHANGES=$(git log --pretty=format:"- %s" "${TAG}" | grep -v "^- chore:" || true)
          fi
          # Escape markdown-special characters (pipes can break tables if
          # commit messages are ever rendered inside one; backticks are safe
          # in bullet lists but we escape pipes out of caution).
          CHANGES=$(echo "$CHANGES" | sed 's/|/\\|/g')
          if [ -z "$CHANGES" ]; then
            CHANGES="- Maintenance and bug fixes"
          fi

          # Build release notes matching the v0.2.0 format
          {
            echo "## Downloads"
            echo ""
            echo "| Platform | Download |"
            echo "|----------|----------|"
            echo "| **Windows** | [EventBox-Windows.msi](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Windows.msi) |"
            echo "| **macOS (Apple Silicon)** | [EventBox-Mac.dmg](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Mac.dmg) |"
            echo "| **Linux (.deb)** | [EventBox-Linux.deb](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Linux.deb) |"
            echo "| **Linux (AppImage)** | [EventBox-Linux.AppImage](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Linux.AppImage) |"
            echo ""
            echo "## What's New"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "## Install"
            echo ""
            echo "Download the installer for your platform, double-click to install, paste your Event ID, and click Start. No terminal or dependencies needed."
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release_notes.md
