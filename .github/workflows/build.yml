name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            deno-target: x86_64-unknown-linux-gnu
            server-output: src-tauri/resources/eventbox-server
            tauri-rustup: stable
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            deno-target: x86_64-pc-windows-msvc
            server-output: src-tauri/resources/eventbox-server.exe
            tauri-rustup: stable
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            deno-target: aarch64-apple-darwin
            server-output: src-tauri/resources/eventbox-server
            tauri-rustup: stable

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Pin Rust 1.85 on Linux: newer compilers break wry 0.24 due to
      # a glob-import trait-name collision between gtk::prelude::SettingsExt
      # and webkit2gtk::SettingsExt (see issue #18).
      - name: Install Rust 1.85 for project build (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Compile EventBox server
        shell: bash
        run: |
          deno compile --no-check \
            --allow-net --allow-read --allow-write --allow-env --allow-ffi \
            --unstable-ffi \
            --target ${{ matrix.deno-target }} \
            --output ${{ matrix.server-output }} \
            src-tauri/resources/server.ts

      - name: Build Tauri app
        run: cd src-tauri && cargo tauri build
        env:
          RUSTUP_TOOLCHAIN: ${{ matrix.tauri-rustup }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Rename artifacts to friendly names
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            cp src-tauri/target/release/bundle/deb/*.deb dist/EventBox-Linux.deb
            cp src-tauri/target/release/bundle/appimage/*.AppImage dist/EventBox-Linux.AppImage
            # Copy .sig files for updater
            cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz dist/EventBox-Linux.AppImage.tar.gz 2>/dev/null || true
            cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig dist/EventBox-Linux.AppImage.tar.gz.sig 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi dist/EventBox-Windows.msi
            cp src-tauri/target/release/bundle/msi/*.msi.zip dist/EventBox-Windows.msi.zip 2>/dev/null || true
            cp src-tauri/target/release/bundle/msi/*.msi.zip.sig dist/EventBox-Windows.msi.zip.sig 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg dist/EventBox-Mac.dmg
            cp src-tauri/target/release/bundle/macos/*.app.tar.gz dist/EventBox-Mac.app.tar.gz 2>/dev/null || true
            cp src-tauri/target/release/bundle/macos/*.app.tar.gz.sig dist/EventBox-Mac.app.tar.gz.sig 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EventBox-${{ matrix.platform }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json for updater
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="W-A-I-T/EventBox"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          # Read signatures (empty string if file missing — updater skips that platform)
          WIN_SIG=$(cat artifacts/EventBox-windows-latest/EventBox-Windows.msi.zip.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat artifacts/EventBox-macos-latest/EventBox-Mac.app.tar.gz.sig 2>/dev/null || echo "")
          LIN_SIG=$(cat artifacts/EventBox-ubuntu-22.04/EventBox-Linux.AppImage.tar.gz.sig 2>/dev/null || echo "")

          # Use jq to generate valid JSON (handles newlines/special chars in signatures)
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See release notes at $RELEASE_URL" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$WIN_SIG" \
            --arg base "$BASE" \
            --arg mac_sig "$MAC_SIG" \
            --arg lin_sig "$LIN_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $win_sig,
                  url: ($base + "/EventBox-Windows.msi.zip")
                },
                "darwin-aarch64": {
                  signature: $mac_sig,
                  url: ($base + "/EventBox-Mac.app.tar.gz")
                },
                "linux-x86_64": {
                  signature: $lin_sig,
                  url: ($base + "/EventBox-Linux.AppImage.tar.gz")
                }
              }
            }' > artifacts/latest.json

      - name: Build release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Collect commit messages since previous tag (skip chore: commits)
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" | grep -v "^- chore:" || true)
          else
            CHANGES=$(git log --pretty=format:"- %s" "${TAG}" | grep -v "^- chore:" || true)
          fi
          # Escape markdown-special characters (pipes can break tables if
          # commit messages are ever rendered inside one; backticks are safe
          # in bullet lists but we escape pipes out of caution).
          CHANGES=$(echo "$CHANGES" | sed 's/|/\\|/g')
          if [ -z "$CHANGES" ]; then
            CHANGES="- Maintenance and bug fixes"
          fi

          # Build release notes matching the v0.2.0 format
          {
            echo "## Downloads"
            echo ""
            echo "| Platform | Download |"
            echo "|----------|----------|"
            echo "| **Windows** | [EventBox-Windows.msi](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Windows.msi) |"
            echo "| **macOS (Apple Silicon)** | [EventBox-Mac.dmg](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Mac.dmg) |"
            echo "| **Linux (.deb)** | [EventBox-Linux.deb](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Linux.deb) |"
            echo "| **Linux (AppImage)** | [EventBox-Linux.AppImage](https://github.com/W-A-I-T/EventBox/releases/download/${TAG}/EventBox-Linux.AppImage) |"
            echo ""
            echo "## What's New"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "## Install"
            echo ""
            echo "Download the installer for your platform, double-click to install, paste your Event ID, and click Start. No terminal or dependencies needed."
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release_notes.md
