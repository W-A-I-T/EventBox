name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            deno-target: x86_64-unknown-linux-gnu
            server-output: src-tauri/resources/eventbox-server
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            deno-target: x86_64-pc-windows-msvc
            server-output: src-tauri/resources/eventbox-server.exe
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            deno-target: aarch64-apple-darwin
            server-output: src-tauri/resources/eventbox-server

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1"

      - name: Compile EventBox server
        shell: bash
        run: |
          deno compile --no-check \
            --allow-net --allow-read --allow-write --allow-env --allow-ffi \
            --unstable-ffi \
            --target ${{ matrix.deno-target }} \
            --output ${{ matrix.server-output }} \
            src-tauri/resources/server.ts

      - name: Build Tauri app
        run: cd src-tauri && cargo tauri build

      - name: Upload artifacts (Linux .deb)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: EventBox-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload artifacts (Linux .AppImage)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: EventBox-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (Windows .msi)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EventBox-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload artifacts (macOS .dmg)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EventBox-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
